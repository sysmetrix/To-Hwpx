<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>To HWPX 로고 컨셉 비교</title>
<style>
  body { font-family: 'Noto Sans KR', Arial, sans-serif; background: #faf9f6; color: #1c1d22; padding: 40px; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p.lead { color: #565a62; margin-top: 0; margin-bottom: 40px; }
  .concept { background: #fff; border: 1px solid #e6e4dd; border-radius: 14px; padding: 28px; margin-bottom: 28px; }
  .concept h2 { font-size: 18px; margin: 0 0 16px; }
  .row { display: flex; align-items: center; gap: 32px; flex-wrap: wrap; }
  .sizes { display: flex; align-items: flex-end; gap: 20px; }
  .size-item { text-align: center; }
  .size-item span { display: block; font-size: 12px; color: #686c75; margin-top: 6px; }
  .size-item img.s512 { width: 96px; height: 96px; }
  .size-item img.s64  { width: 48px; height: 48px; }
  .size-item img.s32  { width: 24px; height: 24px; }
  .size-item img.s16  { width: 16px; height: 16px; }
  .lockup img { height: 64px; }
  .browser-tab { display: inline-flex; align-items: center; gap: 6px; background: #ececec; border-radius: 8px 8px 0 0; padding: 6px 14px; font-size: 12px; color: #444; }
  .browser-tab img { width: 16px; height: 16px; }
</style>
</head>
<body>
  <h1>To HWPX 로고 컨셉 3안</h1>
  <p class="lead">브랜드 방향: A. 조용한 공공 신뢰 — 파란 단일 포인트 컬러(#2252e4) 유지, 장식 최소</p>

  <div class="concept">
    <h2>컨셉 1 — 변환 화살표 문서</h2>
    <div class="row">
      <div class="sizes">
        <div class="size-item"><img class="s512" src="concept-1-mark.svg"><span>512</span></div>
        <div class="size-item"><img class="s64" src="concept-1-mark.svg"><span>64</span></div>
        <div class="size-item"><img class="s32" src="concept-1-mark.svg"><span>32</span></div>
        <div class="size-item"><img class="s16" src="concept-1-mark.svg"><span>16(탭)</span></div>
      </div>
      <div class="browser-tab"><img src="concept-1-mark.svg"> To HWPX - 한글로</div>
      <div class="lockup"><img src="lockup-1.svg"></div>
    </div>
  </div>

  <div class="concept">
    <h2>컨셉 2 — 이중 문서 오버랩 (입력→출력)</h2>
    <div class="row">
      <div class="sizes">
        <div class="size-item"><img class="s512" src="concept-2-mark.svg"><span>512</span></div>
        <div class="size-item"><img class="s64" src="concept-2-mark.svg"><span>64</span></div>
        <div class="size-item"><img class="s32" src="concept-2-mark.svg"><span>32</span></div>
        <div class="size-item"><img class="s16" src="concept-2-mark.svg"><span>16(탭)</span></div>
      </div>
      <div class="browser-tab"><img src="concept-2-mark.svg"> To HWPX - 한글로</div>
      <div class="lockup"><img src="lockup-2.svg"></div>
    </div>
  </div>

  <div class="concept">
    <h2>컨셉 3 — 미니멀 워드마크 + 도트</h2>
    <div class="row">
      <div class="sizes">
        <div class="size-item"><img class="s512" src="concept-3-mark.svg"><span>512</span></div>
        <div class="size-item"><img class="s64" src="concept-3-mark.svg"><span>64</span></div>
        <div class="size-item"><img class="s32" src="concept-3-mark.svg"><span>32</span></div>
        <div class="size-item"><img class="s16" src="concept-3-mark.svg"><span>16(탭)</span></div>
      </div>
      <div class="browser-tab"><img src="concept-3-mark.svg"> To HWPX - 한글로</div>
      <div class="lockup"><img src="lockup-3.svg"></div>
    </div>
  </div>
</body>
</html>
